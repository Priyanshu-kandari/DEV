<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>Personal Details</legend><br>
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Enter Your Name" /><br><br>
        <label for="email">email</label>
        <input id="email" type="email" placeholder="Enter Your email" /><br><br>
      </fieldset><br>

      <label for="Courses">Select Courses</label>
      <select name="" id="Courses">
        <optgroup label="Frontend">
          <option value="">HTML</option>
          <option value="">CSS</option>
          <option value="">JS</option>
        </optgroup>

        <optgroup label="Backend">
          <option value="">Node</option>
          <option value="">MongoDB</option>
          <option value="">Express</option>
        </optgroup>
      </select>
      <br /><br />
      <label for="reviews">Reviews</label>
      <textarea name="" id="reviews" rows="4"></textarea>
    </form>
  </body>
</html>
